services:
  db:
    image: mysql:8.0
    container_name: xgs-11-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todo_app
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-33111}:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - todo-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - todo-network

  db-migrate:
    image: mysql:8.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./database/init.sql:/migrations/init.sql:ro
    networks:
      - todo-network
    command: >
      sh -c 'mysql -h db -uroot -p"$${MYSQL_ROOT_PASSWORD}" < /migrations/init.sql'
    restart: "no"

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xgs-11-app
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-18111}:8080"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    networks:
      - todo-network
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=todo_app
      - DB_USER=root
      - DB_PASS=root
      - JAVA_OPTS=-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8
      - LANG=C.UTF-8

networks:
  todo-network:
    driver: bridge

volumes:
  todo-db-data:
